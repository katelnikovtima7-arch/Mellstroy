<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Меллстрой</title>

<style>
body{
    margin:0;
    overflow:hidden;
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
}

#background{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

#hero{
    position:absolute;
    bottom:10%;
    left:50%;
    transform:translateX(-50%);
    width:35%;
    max-width:260px;
}

#dance{
    position:absolute;
    bottom:10%;
    left:50%;
    transform:translateX(-50%);
    width:30%;
    max-width:320px;
    display:none;
}

#stats{
    position:absolute;
    top:69px;
    left:20px;
    color:#0050D8;
    font-size:30px;
    font-weight:bold;
    text-shadow:
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;
    z-index:10;
    line-height:1.8;
}

#musicBtn{
    position:absolute;
    top:80px;
    right:20px;
    width:55px;
    z-index:20;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="game">

<img id="musicBtn" src="IMG_0698.png">

<audio id="music" loop>
    <source src="music.mp3.mp3" type="audio/mpeg">
</audio>

<img id="background" src="IMG_0680.png">

<div id="stats">
    <div>🍽️ Съедено: 0</div>
    <div>💰 Потрачено: 0 ₽</div>
    <div id="timeCounter">⏱️ В игре: 0 мин</div>
</div>

<img id="hero" src="IMG_0686.png">

<video id="dance" loop muted playsinline>
    <source src="copy_7A631D80-11D5-4A7E-9A6E-F0476D898094.mov">
</video>

</div>

<script>
let minutes = localStorage.getItem("minutes") || 0;

document.getElementById("timeCounter").innerText =
"⏱️ В игре: " + minutes + " мин";

setInterval(() => {
    minutes++;

    document.getElementById("timeCounter").innerText =
    "⏱️ В игре: " + minutes + " мин";

    localStorage.setItem("minutes", minutes);
}, 60000);

const music = document.getElementById("music");
const musicBtn = document.getElementById("musicBtn");
const hero = document.getElementById("hero");
const dance = document.getElementById("dance");

music.volume = 0.5;

musicBtn.onclick = () => {
    if (music.paused) {

        music.play();
        musicBtn.src = "IMG_0696.png";

        hero.style.display = "none";
        dance.style.display = "block";

        dance.currentTime = 0;
        dance.play();

    } else {

        music.pause();
        dance.pause();

        musicBtn.src = "IMG_0698.png";

        hero.style.display = "block";
        dance.style.display = "none";
    }
};
</script>

</body>
</html>
