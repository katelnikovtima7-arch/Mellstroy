<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Меллстрой</title>

<style>
#carrot{
    position:absolute;
    width:70px;
    left:12%;
    top:58%;
    z-index:15;
    touch-action:none;
}
    html, body{
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
}

#carrotPrice{
    position:absolute;
    color:white;
    background:rgba(0,0,0,0.7);
    padding:2px 6px;
    border-radius:6px;
    font-size:14px;
    font-weight:bold;
    z-index:16;
    pointer-events:none;
}

body{
    margin:0;
    overflow:hidden;
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
}

#background{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

#hero{
    position:absolute;
    bottom:10%;
    left:50%;
    transform:translateX(-50%);
    width:35%;
    max-width:260px;
}
    #painting{
    position:absolute;
    width:80px;
    right:22%;
    top:27%;
    z-index:5;
}

#dance{
    position:absolute;
    bottom:24%;
    left:50%;
    transform:translateX(-50%);
    width:27%;
    max-width:320px;
    display:none;
}

#idleAnim{
    position:absolute;
    bottom:24%;
    left:50%;
    transform:translateX(-50%);
    width:28%;
    max-width:190px;
    display:none;
}
    
#eatAnim{
    position:absolute;
    bottom:24%;
    left:50%;
    transform:translateX(-50%);
    width:30%;
    max-width:190px;
    display:none;
}
#stats{
    position:absolute;
    top:69px;
    left:20px;
    color:#0050D8;
    font-size:30px;
    font-weight:bold;
    text-shadow:
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px 1px 0 #000,
     1px 1px 0 #000;
    z-index:10;
    line-height:1.8;
}

#musicBtn{
    position:absolute;
    top:80px;
    right:20px;
    width:55px;
    z-index:20;
       cursor:pointer;
}
</style>
</head>

<body>

<div id="game">

<img id="musicBtn" src="IMG_0698.png">

<audio id="music" loop>
    <source src="music.mp3.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound">
    <source src="click.mp3" type="audio/mpeg">
</audio>

<audio id="robotSound">
    <source src="audio.robot .mp3" type="audio/mpeg">
</audio>

<audio id="burmaldaSound" src="2_audio_612140.mp3"></audio>

<audio id="foodSound">
    <source src="food.mp3" type="audio/mpeg">
</audio>
    <audio id="eatVoice">
    <source src="Audio.fyd">
</audio>

<img id="background" src="IMG_0680.png">

<div id="stats">
    <div id="eatenCounter">🍽️ Съедено: 0</div>
    <div>💰 Потрачено: 0 ₽</div>
    <div id="timeCounter">⏱️ В игре: 0 мин</div>
    <div id="burmaldaCounter">🎰 Бурмалды: 0</div>
 
    <img id="painting" src="IMG_0797.jpeg">

<img id="carrot" src="IMG_0759-no-bg-preview-carve.photos.png">
<div id="carrotPrice">0 ₽</div>

<video id="dance" loop muted playsinline>
    <source src="copy_7A631D80-11D5-4A7E-9A6E-F0476D898094.mov">
</video>
    <video id="eatAnim" muted playsinline>
    <source src="Video.mell.mov">
</video>

<video id="idleAnim" muted playsinline>
    <source src="copy_B877BA0D-7424-4E88-A24E-5D772D44001A.mov">
</video>

</div>

<script>

let minutes = localStorage.getItem("minutes") || 0;

document.getElementById("timeCounter").innerText =
"⏱️ В игре: " + minutes + " мин";

setInterval(() => {
    minutes++;

    document.getElementById("timeCounter").innerText =
    "⏱️ В игре: " + minutes + " мин";

    localStorage.setItem("minutes", minutes);
}, 60000);

const music = document.getElementById("music");
const musicBtn = document.getElementById("musicBtn");
const hero = document.getElementById("hero");
const dance = document.getElementById("dance");
const idleAnim = document.getElementById("idleAnim");

const clickSound = document.getElementById("clickSound");
const robotSound = document.getElementById("robotSound");
const burmaldaSound = document.getElementById("burmaldaSound");
const foodSound = document.getElementById("foodSound");
const eatVoice = document.getElementById("eatVoice");

clickSound.volume = 1.0;
robotSound.volume = 1.0;
burmaldaSound.volume = 1.0;
foodSound.volume = 1.0;
eatVoice.volume = 1.0;

music.volume = 0.5;

let burmaldy = localStorage.getItem("burmaldy") || 0;
    let eaten = localStorage.getItem("eaten") || 0;

document.getElementById("eatenCounter").innerText =
"🍽️ Съедено: " + eaten;

document.getElementById("burmaldaCounter").innerText =
"🎰 Бурмалды: " + burmaldy;


const carrotPrice = document.getElementById("carrotPrice");
    
const eatAnim = document.getElementById("eatAnim");
carrotPrice.style.left = "85px";
carrotPrice.style.top = "65%";

let eating = false;
let dragging = false;

carrot.addEventListener("pointerdown", () => {
    dragging = true;
});

document.addEventListener("pointermove", (e) => {

    if (!dragging) return;

    carrot.style.left = (e.clientX - 35) + "px";
    carrot.style.top = (e.clientY - 35) + "px";

    carrotPrice.style.left = (e.clientX - 5) + "px";
    carrotPrice.style.top = (e.clientY + 30) + "px";

    const heroRect = hero.getBoundingClientRect();
    const carrotRect = carrot.getBoundingClientRect();

    if (
        !eating &&
        carrotRect.left < heroRect.left + heroRect.width * 0.58 &&
        carrotRect.right > heroRect.left + heroRect.width * 0.42 &&
        carrotRect.top < heroRect.top + heroRect.height * 0.35 &&
        carrotRect.bottom > heroRect.top + heroRect.height * 0.20
    ) {

        eating = true;
eaten++;

document.getElementById("eatenCounter").innerText =
"🍽️ Съедено: " + eaten;

localStorage.setItem("eaten", eaten);
        foodSound.currentTime = 0;
        foodSound.play();
        eatVoice.currentTime = 0;
eatVoice.play();
        hero.style.display = "none";

eatAnim.style.display = "block";
eatAnim.currentTime = 0;
eatAnim.play();

        carrot.style.transition = "1s";
        carrot.style.opacity = "0";
        carrot.style.transform = "scale(0)";

        carrotPrice.style.transition = "1s";
        carrotPrice.style.opacity = "0";

        setTimeout(() => {
    carrot.style.display = "none";
    carrotPrice.style.display = "none";
}, 1000);

setTimeout(() => {

    carrot.style.display = "block";
    carrotPrice.style.display = "block";

    carrot.style.opacity = "1";
    carrotPrice.style.opacity = "1";

    carrot.style.transform = "scale(1)";

    carrot.style.left = "12%";
    carrot.style.top = "58%";

    carrotPrice.style.left = "85px";
    carrotPrice.style.top = "65%";

    eating = false;

}, 7000);
    }
});

document.addEventListener("pointerup", () => {
    dragging = false;
});
eatAnim.addEventListener("ended", () => {

    eatAnim.style.display = "none";

    hero.style.display = "block";

});
</script>

</body>
</html>
