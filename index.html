<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Меллстрой</title>

<style>
body{
    margin:0;
    overflow:hidden;
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
}

#background{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

#hero{
    position:absolute;
    bottom:10%;
    left:50%;
    transform:translateX(-50%);
    width:35%;
    max-width:260px;
}
#stats{
    position:absolute;
    top:20px;
    left:20px;
    ccolor:#111;
    font-size:24px;
    font-weight:bold;
    text-shadow:1px 1px 2px rgba(255,255,255,0.7);
    z-index:10;
    line-height:1.8;
}</style>
</head>

<body>

<div id="game">

<img id="background" src="IMG_0680.png">

<img id="hero" src="IMG_0686.png"><div id="stats">
    <div>🍽️ Съедено: 0</div>
    <div>💰 Потрачено: 0 ₽</div>
    <div id="timeCounter">⏱️ В игре: 0 мин</div>
</div>

</div>

<script>
let minutes = 0;

setInterval(() => {
    minutes++;
    document.getElementById("timeCounter").innerText =
        "⏱️ В игре: " + minutes + " мин";
}, 60000);
</script>
</html>
