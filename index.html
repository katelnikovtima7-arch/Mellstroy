<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Меллстрой</title>

<style>

#carrot{
    position:absolute;
    width:70px;
    left:12%;
    top:58%;
    z-index:15;
    touch-action:none;
}

#carrotPrice{
    position:absolute;
    color:white;
    background:rgba(0,0,0,0.7);
    padding:2px 6px;
    border-radius:6px;
    font-size:14px;
    font-weight:bold;
    z-index:16;
    pointer-events:none;
}

body{
    margin:0;
    overflow:hidden;
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
}

#background{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

#hero{
    position:absolute;
    bottom:10%;
    left:50%;
    transform:translateX(-50%);
    width:35%;
    max-width:260px;
}

#dance{
    position:absolute;
    bottom:24%;
    left:50%;
    transform:translateX(-50%);
    width:27%;
    max-width:320px;
    display:none;
}

#idleAnim{
    position:absolute;
    bottom:24%;
    left:50%;
    transform:translateX(-50%);
    width:26%;
    max-width:180px;
    display:none;
}

#stats{
    position:absolute;
    top:69px;
    left:20px;
    color:#0050D8;
    font-size:30px;
    font-weight:bold;
    text-shadow:
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;
    z-index:10;
    line-height:1.8;
}

#musicBtn{
    position:absolute;
    top:80px;
    right:20px;
    width:55px;
    z-index:20;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="game">

<img id="musicBtn" src="IMG_0698.png">

<audio id="music" loop>
    <source src="music.mp3.mp3" type="audio/mpeg">
